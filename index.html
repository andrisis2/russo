<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Русский — Impara il russo</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root{
    --bg:#eef1f8; --bg2:#f8fafd;
    --card:#ffffff; --card2:#eef2f9; --line:#e3e8f1;
    --text:#16203a; --muted:#6c7891; --accent:#e2384b; --accent2:#2f6bed;
    --good:#16a34a; --bad:#dc2626; --radius:18px;
    --shadow-sm:0 1px 2px rgba(16,24,40,.06);
    --shadow:0 1px 3px rgba(16,24,40,.05), 0 10px 26px rgba(16,24,40,.07);
    --shadow-lg:0 6px 16px rgba(16,24,40,.08), 0 18px 40px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 240px) fixed; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:14px 18px; padding-top:calc(14px + env(safe-area-inset-top));
    display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:rgba(255,255,255,.82); backdrop-filter:saturate(180%) blur(12px); z-index:5;
  }
  header h1{
    font-size:20px; margin:0; letter-spacing:.3px; flex:1; font-weight:800;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text;
    background-clip:text; -webkit-text-fill-color:transparent;
  }
  header .flag{font-size:22px}
  .back{background:none;border:none;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;padding:7px 11px;border-radius:10px;transition:.12s}
  .back:hover{background:var(--card2);color:var(--text)}
  main{flex:1; padding:18px; max-width:680px; width:100%; margin:0 auto}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .tile{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 16px; cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s; text-align:left;
    display:flex; flex-direction:column; gap:10px; min-height:128px; box-shadow:var(--shadow-sm);
  }
  .tile:active{transform:scale(.97)}
  .tile:hover{transform:translateY(-3px); box-shadow:var(--shadow); border-color:transparent}
  .tile .ico{
    font-size:26px; width:50px; height:50px; display:flex; align-items:center; justify-content:center;
    background:var(--card2); border-radius:14px; line-height:1;
  }
  .tile .t{font-weight:700; font-size:16px; letter-spacing:.2px}
  .tile .d{font-size:12.5px; color:var(--muted); line-height:1.45}
  .tile .badge{font-size:11px;color:var(--accent);font-weight:600}
  .stats{display:flex;gap:10px;margin:2px 0 18px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;flex:1;min-width:84px;text-align:center;box-shadow:var(--shadow-sm)}
  .stat b{display:block;font-size:24px;font-weight:800;letter-spacing:-.5px}
  .stat:nth-child(3) b{color:var(--good)}
  .stat:nth-child(4) b{color:var(--accent)}
  .stat span{font-size:11px;color:var(--muted)}

  /* card / esercizio */
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .progress{width:100%;height:8px;background:var(--card2);border-radius:8px;overflow:hidden}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s;border-radius:8px}
  .flash{
    width:100%; min-height:240px; background:var(--card); border:1px solid var(--line);
    border-radius:22px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:30px 22px; cursor:pointer; text-align:center; position:relative; box-shadow:var(--shadow);
  }
  .flash .ru{font-size:44px; font-weight:800; line-height:1.12; letter-spacing:-.5px}
  .flash .small{font-size:15px;color:var(--muted)}
  .flash .translit{font-size:18px;color:var(--accent2);font-style:italic}
  .flash .it{font-size:27px; font-weight:700}
  .flash .hint{position:absolute;bottom:16px;font-size:12px;color:var(--muted)}
  .speak{
    position:absolute; top:14px; right:14px; background:var(--card2); border:1px solid var(--line);
    color:var(--text); width:44px;height:44px;border-radius:50%; font-size:18px; cursor:pointer; transition:.12s;
  }
  .speak:hover{background:#e2e8f4}
  .row{display:flex;gap:12px;width:100%}
  .btn{
    flex:1; padding:15px; border-radius:14px; border:1px solid var(--line); background:var(--card);
    color:var(--text); font-size:15px; font-weight:700; cursor:pointer; transition:.12s; box-shadow:var(--shadow-sm);
  }
  .btn:hover{background:var(--card2)}
  .btn:active{transform:scale(.97)}
  .btn.good{background:rgba(22,163,74,.10);border-color:var(--good);color:var(--good)}
  .btn.good:hover{background:rgba(22,163,74,.16)}
  .btn.bad{background:rgba(220,38,38,.08);border-color:var(--bad);color:var(--bad)}
  .btn.bad:hover{background:rgba(220,38,38,.14)}
  .btn.primary{background:linear-gradient(90deg,var(--accent),#f0526a);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(226,56,75,.28)}
  .btn.primary:hover{filter:brightness(1.04)}
  .options{display:flex;flex-direction:column;gap:10px;width:100%}
  .opt{
    padding:16px; border-radius:14px; border:1px solid var(--line); background:var(--card);
    color:var(--text); font-size:18px; font-weight:600; cursor:pointer; text-align:center; transition:.12s; box-shadow:var(--shadow-sm);
  }
  .opt:hover{border-color:var(--accent2);background:#f3f7ff}
  .opt.correct{background:rgba(22,163,74,.12);border-color:var(--good);color:var(--good)}
  .opt.wrong{background:rgba(220,38,38,.10);border-color:var(--bad);color:var(--bad)}
  .opt:disabled{cursor:default}
  .q{font-size:32px;font-weight:800;text-align:center;margin:6px 0;letter-spacing:-.5px}
  .qsub{font-size:14px;color:var(--muted);text-align:center;margin-top:-8px}
  .done{text-align:center;padding:40px 16px}
  .done .big{font-size:60px}
  .done h2{margin:10px 0;font-weight:800}
  .muted{color:var(--muted);font-size:13px;text-align:center;line-height:1.6}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);margin:2px}
  .hidden{display:none!important}
  .gram-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;width:100%;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .gram-card h3{margin:0 0 8px;font-size:17px;color:var(--accent);font-weight:700}
  .gram-card p{margin:0;font-size:14.5px;line-height:1.6;color:var(--text)}

  /* tile in evidenza (full width) */
  .tile.wide{
    grid-column:1/-1;flex-direction:row;align-items:center;min-height:auto;gap:16px;
    background:linear-gradient(120deg,#fff 0%,#fbf3f4 100%);
  }
  .tile.wide .ico{font-size:30px;width:58px;height:58px;background:rgba(226,56,75,.10)}
  .tile.wide .txt{display:flex;flex-direction:column;gap:6px}

  /* ---------- Regole grammaticali (riferimento) ---------- */
  .ref-nav{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;width:100%;-webkit-overflow-scrolling:touch}
  .ref-nav::-webkit-scrollbar{height:0}
  .ref-chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s;box-shadow:var(--shadow-sm)}
  .ref-chip:hover{border-color:var(--accent);color:var(--accent)}
  .ref-sec{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;width:100%;margin-bottom:16px;scroll-margin-top:78px;box-shadow:var(--shadow-sm)}
  .ref-sec .head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .ref-sec .head .ico{
    font-size:22px;line-height:1;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    background:var(--card2);border-radius:12px;flex:0 0 auto;
  }
  .ref-sec h3{margin:0;font-size:18px;color:var(--text);font-weight:800;letter-spacing:-.2px}
  .ref-sec .sub{font-size:12.5px;color:var(--muted);margin:0 0 16px}
  .ref-sec p.txt{font-size:14px;line-height:1.65;margin:0 0 14px}
  .ref-note{background:#eef3ff;border-left:3px solid var(--accent2);border-radius:10px;
    padding:11px 14px;font-size:13.5px;line-height:1.55;color:var(--text);margin:0 0 12px}
  .ref-note b{color:var(--text);font-weight:700}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 0 14px;border-radius:14px;border:1px solid var(--line)}
  table.ref{border-collapse:collapse;width:100%;font-size:14px;min-width:max-content;background:var(--card)}
  table.ref th,table.ref td{padding:10px 13px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  table.ref thead th{background:var(--card2);color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
  table.ref tbody tr:nth-child(even) td{background:#fafbfe}
  table.ref tbody tr:last-child td{border-bottom:none}
  table.ref tbody td:first-child{color:var(--muted);font-weight:600}
  table.ref td.ru{color:var(--text);font-weight:700}
  table.ref td.ru.tap{cursor:pointer}
  table.ref td.ru.tap:hover{color:var(--accent2)}
  table.ref td.ru.tap:active{color:var(--accent)}

  /* splash screen */
  #splash{
    position:fixed; inset:0; z-index:9999;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    transition:opacity .4s ease;
  }
  #splash img{
    width:100%; height:100%;
    object-fit:contain;
  }
  #splash.fade-out{opacity:0; pointer-events:none}
</style>
</head>
<body>
<div id="splash"><img src="splash.png" alt="Русский с Викой"></div>
<header>
  <button class="back hidden" id="backBtn">‹ Indietro</button>
  <span class="flag">🇷🇺</span>
  <h1>Русский</h1>
</header>
<main id="app"></main>

<script>
const STORE_KEY = "russo_srs_v1";
let DB = null;
let srs = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
function saveSrs(){ localStorage.setItem(STORE_KEY, JSON.stringify(srs)); }

const app = document.getElementById("app");
const backBtn = document.getElementById("backBtn");
backBtn.onclick = () => renderHome();

// ---------- utility ----------
const $ = (h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
const shuffle = a => a.map(x=>[Math.random(),x]).sort((m,n)=>m[0]-n[0]).map(p=>p[1]);
const sample = (a,n)=>shuffle(a).slice(0,n);

// Text-to-speech russo
let ruVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  ruVoice = vs.find(v=>/ru[-_]?RU/i.test(v.lang)) || vs.find(v=>/^ru/i.test(v.lang)) || null;
}
if ('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ru-RU"; if(ruVoice) u.voice = ruVoice; u.rate = .9;
  speechSynthesis.speak(u);
}

// ---------- SRS (Leitner semplificato) ----------
function box(id){ return (srs[id] && srs[id].box) || 0; }
function dueScore(id){
  const s = srs[id];
  if(!s) return 1000;                 // mai visto = massima priorità
  return s.box * 1000 - (Date.now()-s.last)/60000; // box basso + visto da tempo = priorità
}
function grade(id, ok){
  const s = srs[id] || {box:0, seen:0, correct:0};
  s.box = ok ? Math.min(5, s.box+1) : 0;
  s.seen++; if(ok) s.correct++;
  s.last = Date.now();
  srs[id]=s; saveSrs();
}

// ---------- HOME ----------
function renderHome(){
  backBtn.classList.add("hidden");
  const allItems = [...DB.voci, ...DB.frasi];
  const known = allItems.filter(x=>box(x.id)>=3).length;
  const seen = allItems.filter(x=>srs[x.id]).length;
  const due = allItems.filter(x=>!srs[x.id] || box(x.id)<3).length;

  app.innerHTML = "";
  app.appendChild($(`
    <div class="stats">
      <div class="stat"><b>${allItems.length}</b><span>voci totali</span></div>
      <div class="stat"><b>${seen}</b><span>studiate</span></div>
      <div class="stat"><b>${known}</b><span>consolidate</span></div>
      <div class="stat"><b>${due}</b><span>da ripassare</span></div>
    </div>`));

  const grid = $(`<div class="grid"></div>`);
  const tiles = [
    ["🃏","Flashcard","Vocaboli e frasi RU↔IT con ripetizione dilazionata","flash"],
    ["🔤","Cirillico","Riconosci lettere e leggi parole in cirillico","cyr"],
    ["📐","Grammatica","Quiz su generi, pronomi e regole","gram"],
    ["💬","Frasi & ascolto","Completa la frase e ascolta la pronuncia","phrase"],
  ];
  tiles.forEach(([ico,t,d,mode])=>{
    grid.appendChild($(`
      <button class="tile">
        <div class="ico">${ico}</div>
        <div class="t">${t}</div>
        <div class="d">${d}</div>
      </button>`)).onclick = ()=>start(mode);
  });
  // scheda in evidenza: consultazione delle regole
  if(DB.riferimento && DB.riferimento.length){
    grid.appendChild($(`
      <button class="tile wide">
        <div class="ico">📖</div>
        <div class="txt">
          <div class="t">Regole grammaticali</div>
          <div class="d">Pronomi declinati, verbi coniugati e regole di base — da ripassare quando vuoi</div>
        </div>
      </button>`)).onclick = ()=>start("ref");
  }
  app.appendChild(grid);
  app.appendChild($(`<p class="muted" style="margin-top:22px">Livello A1 · ${DB.meta.aggiornato}<br>Apri il menu del browser e scegli <b>“Aggiungi a schermata Home”</b> per usarla come app.</p>`));
}

function header(title){
  backBtn.classList.remove("hidden");
  app.innerHTML = "";
  return app.appendChild($(`<div class="stage"></div>`));
}
function progressBar(stage){
  const p = $(`<div class="progress"><i></i></div>`); stage.appendChild(p); return p.firstChild;
}

// ---------- 1. FLASHCARD ----------
function start(mode){
  if(mode==="flash") return runFlash();
  if(mode==="cyr") return runCyr();
  if(mode==="gram") return runGram();
  if(mode==="phrase") return runPhrase();
  if(mode==="ref") return runReference();
}

// ---------- 0. REGOLE GRAMMATICALI (consultazione) ----------
const onlyCyrillic = s => (s.match(/[а-яёА-ЯЁ\s]+/g)||[]).join(" ").replace(/\s+/g," ").trim();
const hasCyrillic = s => /[а-яё]/i.test(s);

function runReference(){
  const stage = header();
  const secs = DB.riferimento;

  // navigazione a chip per saltare alle sezioni
  const nav = $(`<div class="ref-nav"></div>`);
  secs.forEach(s=>{
    const chip = $(`<button class="ref-chip">${s.icona||""} ${s.categoria}</button>`);
    chip.onclick = ()=>document.getElementById("sec-"+s.id).scrollIntoView({behavior:"smooth",block:"start"});
    nav.appendChild(chip);
  });
  stage.appendChild(nav);

  secs.forEach(s=>{
    const sec = $(`<section class="ref-sec" id="sec-${s.id}"></section>`);
    sec.appendChild($(`
      <div class="head">
        <span class="ico">${s.icona||"📌"}</span>
        <h3>${s.categoria}</h3>
      </div>`));
    if(s.sottotitolo) sec.appendChild($(`<p class="sub">${s.sottotitolo}</p>`));

    (s.blocchi||[]).forEach(b=>{
      if(b.tipo==="testo"){
        sec.appendChild($(`<p class="txt">${b.testo}</p>`));
      } else if(b.tipo==="nota"){
        sec.appendChild($(`<div class="ref-note">💡 ${b.testo}</div>`));
      } else if(b.tipo==="tabella"){
        const wrap = $(`<div class="tbl-wrap"></div>`);
        const t = $(`<table class="ref"></table>`);
        const thead = $(`<thead></thead>`);
        const trh = $(`<tr></tr>`);
        b.intestazioni.forEach(h=>trh.appendChild($(`<th>${h}</th>`)));
        thead.appendChild(trh); t.appendChild(thead);
        const tbody = $(`<tbody></tbody>`);
        b.righe.forEach(r=>{
          const tr = $(`<tr></tr>`);
          r.forEach((cell,ci)=>{
            const cy = ci>0 && hasCyrillic(cell);   // 1ª colonna = etichetta italiana
            const td = $(`<td class="${cy?'ru tap':''}">${cell}</td>`);
            if(cy){ const say=onlyCyrillic(cell); td.onclick=()=>speak(say); }
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        t.appendChild(tbody); wrap.appendChild(t); sec.appendChild(wrap);
      }
    });
    stage.appendChild(sec);
  });

  const home = $(`<button class="btn" style="margin-top:4px">↑ Torna su</button>`);
  home.onclick = ()=>stage.scrollIntoView({behavior:"smooth",block:"start"});
  stage.appendChild(home);
}

function runFlash(){
  const pool = [...DB.voci, ...DB.frasi].sort((a,b)=>dueScore(b.id)-dueScore(a.id));
  const deck = pool.slice(0, Math.min(12, pool.length));
  let i=0;
  const stage = header();
  const bar = progressBar(stage);
  const cardWrap = $(`<div style="width:100%"></div>`); stage.appendChild(cardWrap);

  function show(){
    if(i>=deck.length) return finish(stage, "Flashcard completate", runFlash);
    bar.style.width = (i/deck.length*100)+"%";
    const c = deck[i]; let flipped=false;
    cardWrap.innerHTML="";
    const card = $(`
      <div class="flash">
        <button class="speak" title="Ascolta">🔊</button>
        <div class="ru">${c.ru}</div>
        <div class="translit">${c.translit}</div>
        <div class="hint">tocca per vedere la traduzione</div>
      </div>`);
    card.querySelector(".speak").onclick = (e)=>{e.stopPropagation(); speak(c.ru);};
    card.onclick = ()=>{
      if(flipped) return;
      flipped=true;
      card.innerHTML = `<div class="it">${c.it}</div><div class="small">${c.ru} · ${c.translit}</div>`;
      controls.classList.remove("hidden");
    };
    cardWrap.appendChild(card);
    const controls = $(`
      <div class="row hidden" style="margin-top:14px">
        <button class="btn bad">Da ripassare</button>
        <button class="btn good">La sapevo</button>
      </div>`);
    controls.children[0].onclick=()=>{grade(c.id,false); i++; render();};
    controls.children[1].onclick=()=>{grade(c.id,true); i++; render();};
    cardWrap.appendChild(controls);
    if('speechSynthesis' in window) setTimeout(()=>speak(c.ru), 150);
  }
  function render(){ show(); }
  show();
}

// ---------- 2. CIRILLICO ----------
function runCyr(){
  // metà domande sulle lettere, metà lettura parole
  const letterQs = sample(DB.alfabeto, 6).map(l=>({
    q:l.ru.split(" ")[0], sub:"Che suono ha questa lettera?",
    correct:l.translit,
    opts: shuffle([l.translit, ...sample(DB.alfabeto.filter(x=>x.translit!==l.translit),3).map(x=>x.translit)])
  }));
  const wordQs = sample(DB.voci, 6).map(w=>({
    q:w.ru, sub:"Come si legge (traslitterazione)?",
    correct:w.translit,
    opts: shuffle([w.translit, ...sample(DB.voci.filter(x=>x.translit!==w.translit),3).map(x=>x.translit)]),
    id:w.id, speak:w.ru
  }));
  runMCQ(shuffle([...letterQs, ...wordQs]).slice(0,10), "Cirillico", runCyr);
}

// ---------- 3. GRAMMATICA ----------
function runGram(){
  const stage = header();
  // mostra le schede-regola, poi i drill
  DB.grammatica.forEach(g=>{
    stage.appendChild($(`<div class="gram-card"><h3>${g.titolo}</h3><p>${g.spiegazione}</p></div>`));
  });
  const btn = $(`<button class="btn primary" style="margin-top:6px">Inizia gli esercizi →</button>`);
  btn.onclick = ()=>{
    const qs=[];
    DB.grammatica.forEach(g=>{
      g.drill.forEach(d=>{
        const others = g.drill.filter(x=>x.risposta!==d.risposta).map(x=>x.risposta);
        const wrong = [...new Set(others)];
        qs.push({
          q:d.domanda, sub:g.titolo,
          correct:d.risposta,
          opts: shuffle([d.risposta, ...sample(wrong,3)]).slice(0,4)
        });
      });
    });
    runMCQ(shuffle(qs).slice(0,10), "Grammatica", runGram);
  };
  stage.appendChild(btn);
}

// ---------- 4. FRASI & ASCOLTO ----------
function runPhrase(){
  const deck = sample(DB.frasi, Math.min(8, DB.frasi.length));
  let i=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);

  function show(){
    if(i>=deck.length) return finish(stage,"Sezione completata", runPhrase);
    bar.style.width=(i/deck.length*100)+"%";
    const f=deck[i];
    // togli una parola dalla frase russa
    const words=f.ru.replace(/[.!?]/g,'').split(" ");
    const hideIdx=Math.floor(Math.random()*words.length);
    const answer=words[hideIdx].replace(/[.,!?]/g,'');
    const masked=words.map((w,idx)=>idx===hideIdx?"_____":w).join(" ");
    const distract=sample(DB.voci.map(v=>v.ru).concat(DB.frasi.flatMap(x=>x.ru.split(" "))).filter(w=>w.replace(/[.,!?]/g,'')!==answer),3);
    const opts=shuffle([answer,...distract.map(d=>d.replace(/[.,!?]/g,''))]);
    wrap.innerHTML="";
    wrap.appendChild($(`<div class="q">${masked}</div>`));
    wrap.appendChild($(`<div class="qsub">${f.it} &nbsp;·&nbsp; <span style="color:var(--accent2)">${f.translit}</span></div>`));
    const sp=$(`<button class="btn" style="margin:14px 0">🔊 Ascolta la frase</button>`);
    sp.onclick=()=>speak(f.ru); wrap.appendChild(sp);
    const optBox=$(`<div class="options"></div>`);
    opts.forEach(o=>{
      const b=$(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...optBox.children].forEach(c=>c.disabled=true);
        const ok=o===answer;
        b.classList.add(ok?"correct":"wrong");
        if(!ok)[...optBox.children].find(c=>c.textContent===answer).classList.add("correct");
        grade(f.id, ok);
        speak(f.ru);
        const next=$(`<button class="btn primary" style="margin-top:14px">Continua →</button>`);
        next.onclick=()=>{i++; show();}; wrap.appendChild(next);
      };
      optBox.appendChild(b);
    });
    wrap.appendChild(optBox);
  }
  show();
}

// ---------- motore quiz a scelta multipla ----------
function runMCQ(questions, title, restart){
  let i=0, correct=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);
  function show(){
    if(i>=questions.length) return finish(stage, `${title}: ${correct}/${questions.length}`, restart);
    bar.style.width=(i/questions.length*100)+"%";
    const Q=questions[i];
    wrap.innerHTML="";
    const q=$(`<div class="q">${Q.q}</div>`); wrap.appendChild(q);
    if(Q.speak){ const sp=$(`<button class="btn" style="margin:0 0 6px">🔊</button>`); sp.onclick=()=>speak(Q.speak); wrap.appendChild(sp); }
    wrap.appendChild($(`<div class="qsub">${Q.sub}</div>`));
    const box=$(`<div class="options" style="margin-top:16px"></div>`);
    Q.opts.forEach(o=>{
      const b=$(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...box.children].forEach(c=>c.disabled=true);
        const ok=o===Q.correct;
        b.classList.add(ok?"correct":"wrong");
        if(ok) correct++;
        else [...box.children].find(c=>c.textContent===Q.correct).classList.add("correct");
        if(Q.id) grade(Q.id, ok);
        if(Q.speak) speak(Q.speak);
        const next=$(`<button class="btn primary" style="margin-top:16px">${i+1<questions.length?"Avanti →":"Risultato"}</button>`);
        next.onclick=()=>{i++; show();}; wrap.appendChild(next);
      };
      box.appendChild(b);
    });
    wrap.appendChild(box);
  }
  show();
}

// ---------- schermata fine ----------
function finish(stage, msg, restart){
  stage.innerHTML = `
    <div class="done">
      <div class="big">🎉</div>
      <h2>${msg}</h2>
      <p class="muted">Ben fatto! I progressi sono salvati sul dispositivo.</p>
    </div>`;
  const row=$(`<div class="row"></div>`);
  const a=$(`<button class="btn">Home</button>`); a.onclick=renderHome;
  const b=$(`<button class="btn primary">Ancora</button>`); b.onclick=restart;
  row.appendChild(a); row.appendChild(b); stage.appendChild(row);
}

// ---------- boot ----------
fetch("knowledge.json?_="+Date.now())
  .then(r=>r.json())
  .then(db=>{ DB=db; renderHome(); })
  .catch(e=>{ app.innerHTML=`<p class="muted">Impossibile caricare knowledge.json<br><small>${e}</small></p>`; });

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// splash: rimane 1 s poi sfuma in 400 ms
setTimeout(()=>{
  const s=document.getElementById('splash');
  s.classList.add('fade-out');
  s.addEventListener('transitionend',()=>s.remove(),{once:true});
},1000);
</script>
