      [0,'🎲 Mix','Livelli misti — selezionati a caso'],
    ];
    levels.forEach(([lvl,label,desc])=>{
      const btn=$(`<button class="tile wide" style="margin-bottom:10px">
        <div class="txt"><div class="t">${label}</div><div class="d">${desc}</div></div>
      </button>`);
      btn.onclick=()=>runPhrase(lvl);
      stage.appendChild(btn);
    });
    return;
  }

  // Parole funzione russe: non vanno mascherate né usate come distrattori
  const SKIP = new Set(['и','в','во','не','на','я','что','с','со','а','то','он','она','оно','они','мы','ты','вы','так','его','её','но','да','к','у','же','за','по','от','о','об','из','до','для','это','этот','эта','эти','мой','моя','моё','твой','твоя','наш','ваш','как','где','кто','чем','уже','или','ни','был','была','было','были','есть','вот','там','здесь','тоже','очень','ещё','нет','бы','ли','тем','чем']);

  // Corpus di parole "piene" da frasi + voci per i distrattori
  const corpusWords = [...new Set([
    ...(DB.frasi||[]).flatMap(f=>(f.ru||'').replace(/[.!?,;:—]/g,'').split(' ').map(w=>w.trim())),
    ...(DB.voci||[]).map(v=>(v.ru||'').replace(/[.,!?;:]/g,'').split(' ')[0])
  ].filter(w=>w.length>=3 && /[а-яё]/i.test(w) && !SKIP.has(w.toLowerCase())))];

  // Distrattori plausibili: stessa radice > parole del deck > stessa desinenza > lunghezza simile
  function pickDistractors(answer, exclude, deckWords){
    const lo = answer.toLowerCase();
    const excl = new Set([...exclude].map(w=>w.toLowerCase()));
    excl.add(lo);
    const ok = w => !excl.has(w.toLowerCase());

    // Tier 1: stessa radice (es. говорю → говоришь, говорит) — forma diversa della stessa parola
    const rootLen = Math.min(4, lo.length - 1);
    const root = lo.slice(0, rootLen);
    const t1 = corpusWords.filter(w => ok(w) && w.toLowerCase().startsWith(root));

    // Tier 2: parole dalle ALTRE frasi del deck corrente — contestualmente plausibili
    const t2 = (deckWords||[]).filter(ok);

    // Tier 3: stessa desinenza 3 char (stessa forma grammaticale)
    const e3 = lo.slice(-3);
    const t3 = corpusWords.filter(w => ok(w) && w.toLowerCase().slice(-3)===e3);

    // Tier 4: stessa desinenza 2 char
    const e2 = lo.slice(-2);
    const t4 = corpusWords.filter(w => ok(w) && w.toLowerCase().slice(-2)===e2);

    // Tier 5: lunghezza simile (±1)
    const t5 = corpusWords.filter(w => ok(w) && Math.abs(w.length-answer.length)<=1);

    const result = [];
    const picked = new Set();
    for(const tier of [t1, t2, t3, t4, t5, corpusWords]){
      for(const w of shuffle([...new Set(tier)])){
        if(result.length>=3) break;
        if(!picked.has(w.toLowerCase()) && ok(w)){
          result.push(w);
          picked.add(w.toLowerCase());
        }
      }
      if(result.length>=3) break;
    }
    return result;
  }

  const allFrasi = DB.frasi||[];
  const filtered = level===0 ? allFrasi : allFrasi.filter(f=>f.difficolta===level);
  const pool = filtered.length ? filtered : allFrasi;
  const deck = sample(pool, Math.min(8, pool.length));
  if(!deck.length) return;
  let i=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);

  function show(){
    if(i>=deck.length) return finish(stage,"Sezione completata", ()=>runPhrase(level));
    bar.style.width=(i/deck.length*100)+"%"; bar.setNum(i, deck.length);
    const f=deck[i];
    const sentence = f.ru || '';
    const rawWords = sentence.replace(/[.!?]/g,'').split(' ');
    const clean = rawWords.map(w=>w.replace(/[.,!?;:]/g,''));

    // Preferisci parole "piene" (lunghe ≥4, non parole funzione)
    const candidates = clean.map((w,idx)=>({w,idx}))
      .filter(({w})=>w.length>=4 && /[а-яё]/i.test(w) && !SKIP.has(w.toLowerCase()));
    const {w: answer, idx: hideIdx} = candidates.length
      ? candidates[Math.floor(Math.random()*candidates.length)]
      : {w: clean[0], idx: 0};

    const masked = rawWords.map((w,idx)=>idx===hideIdx?"_____":w).join(" ");
    const deckWords = deck
      .filter(d=>d.id!==f.id)
      .flatMap(d=>(d.ru||'').replace(/[.!?,;:—]/g,'').split(' ').map(w=>w.replace(/[.,!?;:]/g,'')))
      .filter(w=>w.length>=4 && /[а-яё]/i.test(w) && !SKIP.has(w.toLowerCase()));
    const distract = pickDistractors(answer, new Set(clean), deckWords);
    const opts = shuffle([answer, ...distract]);

    wrap.innerHTML="";
    wrap.appendChild($(`<div class="q">${masked}</div>`));
    wrap.appendChild($(`<div class="qsub">${f.it||''}</div>`));
    const sp=$(`<button class="btn" style="margin:14px 0">🔊 Ascolta la frase</button>`);
    sp.onclick=()=>speak(sentence); wrap.appendChild(sp);
    const optBox=$(`<div class="options"></div>`);
    opts.forEach(o=>{
      const b=$(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...optBox.children].forEach(c=>c.disabled=true);
        const ok=o===answer;
        b.classList.add(ok?"correct":"wrong");
        if(!ok)[...optBox.children].find(c=>c.textContent===answer).classList.add("correct");
        haptic(ok);
        grade(f.id, ok);
        speak(sentence);
        // Rivela la traslitterazione completa solo dopo la risposta
        if(f.translit) wrap.appendChild($(`<div class="qsub" style="margin-top:12px;color:var(--accent2)">${f.translit}</div>`));
        const next=$(`<button class="btn primary" style="margin-top:14px">Continua →</button>`);
        next.onclick=()=>{i++; show();}; wrap.appendChild(next);
      };
      optBox.appendChild(b);
    });
    wrap.appendChild(optBox);
  }
  show();
}

// ---------- motore quiz a scelta multipla ----------
function runMCQ(questions, title, restart){
  let i=0, correct=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);
  function show(){
    if(i>=questions.length) return finish(stage, `${title}: ${correct}/${questions.length}`, restart);
    bar.style.width=(i/questions.length*100)+"%"; bar.setNum(i, questions.length);
    const Q=questions[i];
    wrap.innerHTML="";
    const q=$(`<div class="q">${Q.q}</div>`); wrap.appendChild(q);
    if(Q.speak){ const sp=$(`<button class="btn" style="margin:0 0 6px">🔊</button>`); sp.onclick=()=>speak(Q.speak); wrap.appendChild(sp); }
    wrap.appendChild($(`<div class="qsub">${Q.sub}</div>`));
    const box=$(`<div class="options" style="margin-top:16px"></div>`);
    Q.opts.forEach(o=>{
      const b=$(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...box.children].forEach(c=>c.disabled=true);
        const ok=o===Q.correct;
        b.classList.add(ok?"correct":"wrong");
        haptic(ok);
        if(ok) correct++;
        else [...box.children].find(c=>c.textContent===Q.correct).classList.add("correct");
        if(Q.id) grade(Q.id, ok);
        if(Q.speak) speak(Q.speak);
        const next=$(`<button class="btn primary" style="margin-top:16px">${i+1<questions.length?"Avanti →":"Risultato"}</button>`);
        next.onclick=()=>{i++; show();}; wrap.appendChild(next);
      };
      box.appendChild(b);
    });
    wrap.appendChild(box);
  }
  show();
}

// ---------- schermata fine ----------
function finish(stage, msg, restart){
  // se il messaggio contiene un punteggio "x/y" mostro un anello, altrimenti il 🎉
  const m = String(msg).match(/(\d+)\s*\/\s*(\d+)/);
  let topHtml = `<div class="big">🎉</div>`;
  if(m){
    const got=+m[1], tot=+m[2], pct = tot ? Math.round(got/tot*100) : 0;
    const col = pct>=80 ? 'var(--good)' : pct>=50 ? 'var(--accent2)' : 'var(--accent)';
    topHtml = `<div class="ring" style="--col:${col};background:conic-gradient(${col} ${pct*3.6}deg,var(--card2) 0)"><span>${pct}%</span></div>`;
  }
  stage.innerHTML = `
    <div class="done">
      ${topHtml}
      <h2>${msg}</h2>
      <p class="muted">Ben fatto! I progressi sono salvati sul dispositivo.</p>
    </div>`;
  haptic(true);
  const row=$(`<div class="row"></div>`);
  const a=$(`<button class="btn">Home</button>`); a.onclick=()=>history.back();
  const b=$(`<button class="btn primary">Ancora</button>`); b.onclick=restart;
  row.appendChild(a); row.appendChild(b); stage.appendChild(row);
}

// ========== VIKA — Gemini Live + fallback REST ==========
const VIKA_KEY = "vika_gemini_key";
const VIKA_WS  = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent";
const VIKA_REST= "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent";

// Modelli Live API in ordine di preferenza: Google li rinomina spesso,
// quindi proviamo i candidati in sequenza prima di ripiegare sul REST.
// Aggiornato giugno 2026: il preview 12-2025 fallisce a metà turno (errore 1011)
// e i modelli 2.0-live / 09-2025 sono stati spenti da Google.
const VIKA_LIVE_MODELS = [
  "models/gemini-3.1-flash-live-preview",
  "models/gemini-live-2.5-flash-native-audio",
  "models/gemini-2.5-flash-native-audio-preview-12-2025",
];

// --- Helper: PCM float32 → file WAV 16-bit mono, e ArrayBuffer → base64 ---
function pcmToWav(chunks, rate){
  let len=0; for(const c of chunks) len+=c.length;
  const buf=new ArrayBuffer(44+len*2); const v=new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF"); v.setUint32(4,36+len*2,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,len*2,true);
  let o=44;
  for(const c of chunks) for(let i=0;i<c.length;i++){
    const s=Math.max(-1,Math.min(1,c[i])); v.setInt16(o,s*32767,true); o+=2;
  }
  return buf;
}
function bufToB64(buf){
  const u8=new Uint8Array(buf); let s="";
  for(let i=0;i<u8.length;i+=32768) s+=String.fromCharCode.apply(null,u8.subarray(i,i+32768));
  return btoa(s);
}

function vikaPrompt(lang, db, opts={}) {
  const vocab = (db.voci||[]).slice(0,60).map(v=>`${v.ru}=${v.it}`).join(", ");
  const frasi = (db.frasi||[]).slice(0,25).map(f=>`${f.ru}=${f.it}`).join("; ");
  const rule = lang==="ru+it"
    ? "Sei bilingue russo-italiano. Il russo è la lingua principale: rispondi sempre in russo. Puoi aggiungere spiegazioni brevi in italiano tra parentesi o dopo un trattino. Lo studente può parlarti sia in russo che in italiano: se ti parla in italiano, capiscilo e rispondi in russo con una breve nota in italiano. Correggi gli errori gentilmente."
    : "Parla SOLO in russo semplice. Anche le correzioni devono essere in russo.";
  const modeRule = {
    correction: "MODALITÀ CORREZIONE: dopo ogni risposta dello studente, correggi ogni errore grammaticale o lessicale e spiega brevemente il motivo. Poi rispondi al contenuto.",
    roleplay:   "MODALITÀ ROLE-PLAY: simula una situazione quotidiana (bar, negozio, stazione). Mantieni il personaggio. Usa solo vocaboli semplici.",
    free: ""
  }[opts.practiceMode||"free"] || "";
  const srsLine = (opts.srsStats && opts.srsStats.total > 0)
    ? `Lo studente ha consolidato ${opts.srsStats.known} parole su ${opts.srsStats.total} (SRS). Usa preferibilmente parole già studiate.`
    : "";
  const memLine = opts.lastSession
    ? `Contesto sessione precedente:\n${opts.lastSession}`
    : "";
  return [
    "Sei Vika, una tutor di russo paziente e incoraggiante.",
    "Lo studente impara da zero (livello A1) con il corso \"Russo Facile con Yula\".",
    rule, modeRule, srsLine, memLine,
    `Vocaboli già studiati: ${vocab}.`,
    `Frasi già studiate: ${frasi}.`,
    "Risposte brevi (2-3 frasi max).",
    "Rispondi SEMPRE e SOLO con un oggetto JSON con questi campi:",
    '- "trascrizione": le parole esatte dette dallo studente nel messaggio vocale (in cirillico se parla russo, in italiano se parla italiano); stringa vuota se il messaggio non è vocale.',
    '- "pronuncia": SOLO se nell\'audio senti errori di pronuncia evidenti (accento sulla sillaba sbagliata, suono storpiato), una nota brevissima in italiano (max 1 frase); altrimenti stringa vuota.',
    '- "risposta": quello che dici tu come Vika, seguendo le regole sopra.'
  ].filter(Boolean).join("\n");
}

class VikaSession {
  constructor({apiKey,lang,db,onMsg,onStatus,practiceMode,srsStats,lastSession}){
    this.apiKey=apiKey; this.lang=lang; this.db=db;
    this.onMsg=onMsg; this.onStatus=onStatus;
    this.practiceMode=practiceMode||"free";
    this.srsStats=srsStats||null;
    this.lastSession=lastSession||"";
    this.mode=null; this.active=false;
    this.ws=null; this.audioCtx=null; this.micStream=null;
    this.playCtx=null; this.nextPlayTime=0;
    this.recognition=null; this.vikaText="";
    this.gotSetup=false; this.fellBack=false;
    this.history=[];
    this.userInputLang="ru-RU";
    // Modalità audio diretto: il parlato va a Gemini come WAV (capisce molto
    // meglio il russo con accento italiano e valuta la pronuncia)
    this.audioMode=false; this.capturing=false; this._rec=null;
    // Sessione avviata da tastiera: niente microfono, si aspetta il testo scritto
    this.textOnly=false; this._busy=false;
  }

  _opts(){ return {practiceMode:this.practiceMode, srsStats:this.srsStats, lastSession:this.lastSession}; }

  setUserLang(l){
    this.userInputLang=l;
    if(this.mode==="rest"&&this.active){
      try{this.recognition?.stop();}catch(e){}
      this.recognition=null;
    }
    if(this.mode==="live"&&this.recognition){
      try{this.recognition.stop();}catch(e){}
      this.recognition=null;
      this._startSTT();
    }
  }

  async connect(){
    this.active=true;
    this.onStatus("connecting");
    // Modalità live disattivata (giugno 2026): i modelli Live API di Google
    // sono instabili, quindi si parte direttamente in modalità standard.
    // Per riattivare il tentativo live: sostituire le righe sotto con this._tryLive();
    this.fellBack=true;
    if(!this.textOnly){
      try{ await this._startMicVad(); this.audioMode=true; }
      catch(e){ this.audioMode=false; } // niente mic/worklet → riserva: SpeechRecognition
    }
    this._startRest();
  }

  // Invio di un messaggio scritto da tastiera (interrompe la cattura audio in corso)
  sendText(t){
    if(!this.active||this._busy) return;
    t=(t||"").trim(); if(!t) return;
    this.capturing=false;
    try{this.recognition?.stop();}catch(e){} this.recognition=null;
    speechSynthesis.cancel();
    this._chat({text:t});
  }

  _tryLive(modelIdx=0){
    const model=VIKA_LIVE_MODELS[modelIdx];
    if(!model){ // nessun modello rimasto da provare
      if(!this.fellBack){ this.fellBack=true; this._startRest(); }
      return;
    }
    const ws=new WebSocket(`${VIKA_WS}?key=${this.apiKey}`);
    this.ws=ws;
    let settled=false; // questo tentativo ha già deciso (setup ok / modello successivo / fallback)

    // Passa al modello successivo della lista; se è l'ultimo, ripiega sul REST.
    const nextModel=()=>{
      if(settled) return; settled=true;
      clearTimeout(timer);
      if(this.ws===ws){ this.ws=null; }
      try{ws.close();}catch(e){}
      if(modelIdx+1 < VIKA_LIVE_MODELS.length) this._tryLive(modelIdx+1);
      else fallback("⚠️ Live non disponibile — avvio modalità standard...");
    };

    const fallback=(note)=>{
      if(this.fellBack) return;
      this.fellBack=true;
      if(this.ws===ws){ this.ws=null; try{ws.close();}catch(e){} }
      if(note) this.onMsg({role:"vika",text:note,final:true});
      this._startRest();
    };

    const timer=setTimeout(()=>{ if(!this.gotSetup) nextModel(); },10000);

    ws.onopen=()=>{
      ws.send(JSON.stringify({
        setup:{
          model,
          generationConfig:{
            responseModalities:["AUDIO"],
            speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:"Kore"}}}
          },
          // I modelli native-audio restituiscono il testo solo se lo chiediamo
          outputAudioTranscription:{},
          systemInstruction:{parts:[{text:vikaPrompt(this.lang,this.db,this._opts())}]}
        }
      }));
    };

    ws.onmessage=async e=>{
      let d; try{d=JSON.parse(e.data);}catch(err){return;}
      if(d.setupComplete){
        settled=true;
        clearTimeout(timer);
        this.gotSetup=true; this.mode="live";
        this.onStatus("connected");
        await this._startMic(); this._startSTT();
      }
      if(d.serverContent){
        const sc=d.serverContent;
        // Testo: sia dalle parti modelTurn sia dalla trascrizione dell'audio native
        const tr=sc.outputTranscription?.text;
        if(tr){ this.vikaText+=tr; this.onMsg({role:"vika",text:this.vikaText,final:false}); }
        if(sc.modelTurn?.parts){
          this.onStatus("speaking");
          for(const p of sc.modelTurn.parts){
            if(p.text){this.vikaText+=p.text; this.onMsg({role:"vika",text:this.vikaText,final:false});}
            if(p.inlineData?.data) this._playChunk(p.inlineData.data);
          }
        }
        if(sc.turnComplete){
          if(this.vikaText){this.onMsg({role:"vika",text:this.vikaText,final:true}); this.vikaText="";}
          this.onStatus("listening");
        }
      }
      if(d.error){
        const msg=d.error.message||JSON.stringify(d.error);
        if(!this.gotSetup) nextModel();
        else{ clearTimeout(timer); this.onMsg({role:"vika",text:`⚠️ ${msg}`,final:true}); this.onStatus("error"); }
      }
    };

    ws.onerror=()=>{ if(!this.gotSetup) nextModel(); };

    ws.onclose=(ev)=>{
      if(this.ws===ws) this.ws=null;
      if(!this.gotSetup) nextModel();
      else if(this.mode==="live") this.onStatus(ev.wasClean?"disconnected":"dropped");
    };
  }

  async _startRest(){
    this.mode="rest";
    // Conversazione nuova: Vika saluta subito (tranne se l'avvio è da tastiera:
    // lì lo studente ha già scritto il primo messaggio).
    if(!this.history.length && !this.textOnly){ this._chat({}); return; }
    this._resumeInput();
  }

  // Rimette la sessione in ascolto: cattura audio diretta se disponibile,
  // riconoscimento vocale del browser, oppure (modalità tastiera) attende il testo.
  _resumeInput(){
    if(!this.active) return;
    this.onStatus("listening");
    if(this.textOnly) return;              // aspetta input scritto
    if(this.audioMode){
      this._rec={pre:[],preLen:0,buf:[],bufLen:0,speaking:false,silence:0,voiced:0,floor:0.004};
      this.capturing=true;
    } else {
      this._listen();
    }
  }

  // input: stringa (testo dal fallback SpeechRecognition) oppure {audio: base64 WAV}
  async _chat(input){
    if(!this.active||this._busy) return;
    this._busy=true;
    const o=typeof input==="string"?{text:input}:(input||{});
    this.capturing=false;
    const GREET={role:"user",parts:[{text:"Saluta lo studente in russo e chiedi come vuole esercitarsi."}]};
    if(o.text){
      this.history.push({role:"user",parts:[{text:o.text}]});
      this.onMsg({role:"user",text:o.text,final:true});
    }
    this.onStatus(o.audio?"thinking":"speaking");
    try{
      const contents=this.history.slice();
      if(o.audio){
        contents.push({role:"user",parts:[
          {inlineData:{mimeType:"audio/wav",data:o.audio}},
          {text:"Messaggio vocale dello studente: trascrivilo, valuta la pronuncia e rispondi."}
        ]});
      } else if(!o.text && !contents.length){
        contents.push(GREET);
      }
      const body={
        system_instruction:{parts:[{text:vikaPrompt(this.lang,this.db,this._opts())}]},
        contents,
        generationConfig:{
          maxOutputTokens:400,temperature:0.8,
          responseMimeType:"application/json",
          responseSchema:{type:"OBJECT",properties:{
            trascrizione:{type:"STRING"},pronuncia:{type:"STRING"},risposta:{type:"STRING"}
          },required:["risposta"]}
        }
      };
      const resp=await fetch(`${VIKA_REST}?key=${this.apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!resp.ok){const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`);}
      const data=await resp.json();
      const raw=(data.candidates?.[0]?.content?.parts?.[0]?.text||"").trim();
      let out; try{out=JSON.parse(raw);}catch(e){out={risposta:raw};}
      const reply=(out.risposta||"").trim();
      const heard=(out.trascrizione||"").trim();
      const pron=(out.pronuncia||"").trim();
      if(o.audio){
        // Nella cronologia l'audio diventa testo: contesto leggero per i turni successivi
        this.onMsg({role:"user",text:heard||"(audio non chiaro)",final:true});
        this.history.push({role:"user",parts:[{text:heard||"(audio non comprensibile)"}]});
      } else if(!o.text && !this.history.length){
        this.history.push(GREET);
      }
      if(reply){
        this.history.push({role:"model",parts:[{text:reply}]});
        this.onMsg({role:"vika",text:pron?`🗣️ ${pron}\n\n${reply}`:reply,final:true});
        // La nota di pronuncia è in italiano: la legge solo in modalità bilingue
        await this._speak(pron&&this.lang==="ru+it"?`${pron}. ${reply}`:reply);
      }
    }catch(e){
      if(o.audio&&this.audioMode){
        // L'invio audio è fallito: si prosegue col riconoscimento vocale del browser
        this.audioMode=false;
        this.onMsg({role:"vika",text:"⚠️ Audio diretto non disponibile — continuo col riconoscimento vocale del browser.",final:true});
      } else {
        this.onMsg({role:"vika",text:`⚠️ Errore: ${e.message}`,final:true});
        this.onStatus("error"); this._busy=false; return;
      }
    }
    this._busy=false;
    if(this.active) this._resumeInput();
  }

  _listen(){
    if(!this.active) return;
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){this.onMsg({role:"vika",text:"⚠️ Riconoscimento vocale non supportato. Prova Chrome.",final:true}); return;}
    this.recognition=new SR();
    this.recognition.lang=this.userInputLang; this.recognition.continuous=false; this.recognition.interimResults=true;
    let interim=null;
    this.recognition.onresult=e=>{
      let t="",final=false;
      for(let i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript; if(e.results[i].isFinal) final=true;}
      this.onMsg({role:"user",text:t,final:false});
      if(final&&t.trim()) interim=t.trim();
    };
    this.recognition.onerror=()=>{};
    this.recognition.onend=()=>{
      if(this.active&&interim){this._chat(interim); interim=null;}
      else if(this.active){this.onStatus("listening"); this._listen();}
    };
    this.recognition.start();
  }

  async _speak(text){
    return new Promise(resolve=>{
      speechSynthesis.cancel();
      if(this.lang==="ru+it"){
        const segs=this._splitByScript(text);
        let i=0;
        const next=()=>{
          if(i>=segs.length){resolve();return;}
          const {t,isRu}=segs[i++];
          const u=new SpeechSynthesisUtterance(t);
          if(isRu){u.lang="ru-RU"; if(ruVoice) u.voice=ruVoice;}
          else{u.lang="it-IT"; if(itVoice) u.voice=itVoice;}
          u.rate=0.88; u.pitch=1.3; u.onend=next; u.onerror=next;
          speechSynthesis.speak(u);
        };
        next();
      } else {
        const u=new SpeechSynthesisUtterance(text);
        u.lang="ru-RU"; if(ruVoice) u.voice=ruVoice; u.rate=0.88; u.pitch=1.3;
        u.onend=resolve; u.onerror=resolve;
        speechSynthesis.speak(u);
      }
    });
  }

  _splitByScript(text){
    const parts=text.split(/([.!?…\n]+)/);
    const segs=[];
    for(let i=0;i<parts.length;i+=2){
      const t=(parts[i]+(parts[i+1]||"")).trim();
      if(!t) continue;
      const cy=(t.match(/[Ѐ-ӿ]/g)||[]).length;
      const la=(t.match(/[a-zA-Z]/g)||[]).length;
      segs.push({t,isRu:cy>=la});
    }
    return segs.length?segs:[{t:text,isRu:true}];
  }

  // Cattura microfono per la modalità audio diretto: PCM 16 kHz dal worklet,
  // con rilevamento voce a soglia (parte quando parli, chiude dopo ~1.3 s di silenzio).
  async _startMicVad(){
    this.audioCtx=new AudioContext({sampleRate:16000});
    if(this.audioCtx.state==="suspended") await this.audioCtx.resume();
    this.micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const source=this.audioCtx.createMediaStreamSource(this.micStream);
    const code=`class P extends AudioWorkletProcessor{process(i){if(i[0]&&i[0][0])this.port.postMessage(i[0][0].slice());return true}}registerProcessor('pcm-vika-rec',P)`;
    const url=URL.createObjectURL(new Blob([code],{type:"application/javascript"}));
    await this.audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    const node=new AudioWorkletNode(this.audioCtx,"pcm-vika-rec");
    node.port.onmessage=({data})=>this._onAudioChunk(data);
    source.connect(node);
  }

  _onAudioChunk(f32){
    if(!this.capturing||!this.active) return;
    const rec=this._rec; if(!rec) return;
    const rate=this.audioCtx?this.audioCtx.sampleRate:16000;
    let sum=0; for(let i=0;i<f32.length;i++) sum+=f32[i]*f32[i];
    const rms=Math.sqrt(sum/f32.length);
    if(!rec.speaking){
      // Stima del rumore di fondo → soglie adattive
      rec.floor=Math.min(0.02,rec.floor*0.95+rms*0.05);
      rec.pre.push(f32); rec.preLen+=f32.length;
      while(rec.preLen>rate*0.4&&rec.pre.length>1){ rec.preLen-=rec.pre[0].length; rec.pre.shift(); }
      if(rms>Math.max(0.012,rec.floor*3)){
        rec.voiced+=f32.length;
        if(rec.voiced>rate*0.06){
          rec.speaking=true; rec.buf=rec.pre.slice(); rec.bufLen=rec.preLen; rec.silence=0;
          this.onStatus("recording");
        }
      } else rec.voiced=0;
    } else {
      rec.buf.push(f32); rec.bufLen+=f32.length;
      if(rms<Math.max(0.007,rec.floor*2)){
        rec.silence+=f32.length;
        if(rec.silence>rate*1.3) return this._endUtterance();
      } else rec.silence=0;
      if(rec.bufLen>rate*20) this._endUtterance(); // tetto: 20 secondi a turno
    }
  }

  _endUtterance(){
    const rec=this._rec; if(!rec||!rec.speaking) return;
    this.capturing=false;
    const rate=this.audioCtx?this.audioCtx.sampleRate:16000;
    if(rec.bufLen<rate*0.45){ this._resumeInput(); return; } // troppo corto: rumore
    const b64=bufToB64(pcmToWav(rec.buf,rate));
    this._rec=null;
    this._chat({audio:b64});
  }

  async _startMic(){
    this.audioCtx=new AudioContext({sampleRate:16000});
    this.micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const source=this.audioCtx.createMediaStreamSource(this.micStream);
    const code=`class P extends AudioWorkletProcessor{process(i){if(i[0]&&i[0][0])this.port.postMessage(i[0][0].slice());return true}}registerProcessor('pcm-vika',P)`;
    const url=URL.createObjectURL(new Blob([code],{type:"application/javascript"}));
    await this.audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    const node=new AudioWorkletNode(this.audioCtx,"pcm-vika");
    node.port.onmessage=({data})=>{
      if(!this.ws||this.ws.readyState!==WebSocket.OPEN) return;
      const i16=new Int16Array(data.length);
      for(let i=0;i<data.length;i++) i16[i]=Math.max(-32768,Math.min(32767,data[i]*32768));
      let b=""; const u8=new Uint8Array(i16.buffer);
      for(let i=0;i<u8.length;i++) b+=String.fromCharCode(u8[i]);
      this.ws.send(JSON.stringify({realtimeInput:{mediaChunks:[{mimeType:"audio/pcm;rate=16000",data:btoa(b)}]}}));
    };
    source.connect(node);
    this.onStatus("listening");
  }

  _startSTT(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    this.recognition=new SR();
    this.recognition.lang=this.userInputLang; this.recognition.continuous=true; this.recognition.interimResults=true;
    this.recognition.onresult=e=>{
      let t="",final=false;
      for(let i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript; if(e.results[i].isFinal) final=true;}
      this.onMsg({role:"user",text:t,final});
    };
    this.recognition.onerror=()=>{};
    this.recognition.onend=()=>{if(this.ws?.readyState===WebSocket.OPEN) try{this.recognition.start();}catch(e){}};
    this.recognition.start();
  }

  _playChunk(b64){
    if(!this.playCtx||this.playCtx.state==="closed"){
      this.playCtx=new AudioContext({sampleRate:24000}); this.nextPlayTime=0;
    }
    const bin=atob(b64); const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
    const i16=new Int16Array(u8.buffer); const f32=new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++) f32[i]=i16[i]/32768;
    const buf=this.playCtx.createBuffer(1,f32.length,24000);
    buf.getChannelData(0).set(f32);
    const src=this.playCtx.createBufferSource();
    src.buffer=buf; src.connect(this.playCtx.destination);
    const t=Math.max(this.nextPlayTime,this.playCtx.currentTime+0.02);
    src.start(t); this.nextPlayTime=t+buf.duration;
  }

  disconnect(){
    this.active=false; this.capturing=false; this._rec=null;
    try{this.recognition?.stop();}catch(e){} this.recognition=null;
    this.micStream?.getTracks().forEach(t=>t.stop());
    try{this.audioCtx?.close();}catch(e){}
    try{this.playCtx?.close();}catch(e){}
    if(this.ws){const ws=this.ws; this.ws=null; try{ws.close();}catch(e){}}
    speechSynthesis.cancel();
    this.onStatus("disconnected");
  }
}


function runVika(){
  const stage=header();
  let session=null, currentLang="ru", currentPracticeMode="free";
  let vikaEl=null, userEl=null, lastVikaWrap=null;

  // Intestazione rimossa su richiesta

  // Toggle lingua modalità (solo russo vs russo+italiano)
  let currentUserLang="ru-RU";
  const langRow=$(`<div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px"></div>`);
  const btnRu=$(`<button class="btn" style="flex:0;padding:8px 18px;font-size:13px">🇷🇺 Solo russo</button>`);
  const btnBi=$(`<button class="btn" style="flex:0;padding:8px 18px;font-size:13px">🇷🇺🇮🇹 Russo + italiano</button>`);

  // Toggle lingua input utente (visibile solo in modalità ru+it)
  const userLangRow=$(`<div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;display:none"></div>`);
  const btnUsr_ru=$(`<button class="btn" style="flex:0;padding:6px 14px;font-size:12px">🎤🇷🇺 Parlo russo</button>`);
  const btnUsr_it=$(`<button class="btn" style="flex:0;padding:6px 14px;font-size:12px">🎤🇮🇹 Parlo italiano</button>`);
  function setUserInputLang(l){
    currentUserLang=l;
    btnUsr_ru.style.borderColor=l==="ru-RU"?"var(--accent2)":""; btnUsr_ru.style.color=l==="ru-RU"?"var(--accent2)":"";
    btnUsr_it.style.borderColor=l==="it-IT"?"var(--accent2)":""; btnUsr_it.style.color=l==="it-IT"?"var(--accent2)":"";
    if(session) session.setUserLang(l);
  }
  btnUsr_ru.onclick=()=>setUserInputLang("ru-RU");
  btnUsr_it.onclick=()=>setUserInputLang("it-IT");
  userLangRow.appendChild(btnUsr_ru); userLangRow.appendChild(btnUsr_it);

  function setLang(l){
    currentLang=l;
    btnRu.style.borderColor=l==="ru"?"var(--accent2)":""; btnRu.style.color=l==="ru"?"var(--accent2)":"";
    btnBi.style.borderColor=l==="ru+it"?"var(--accent2)":""; btnBi.style.color=l==="ru+it"?"var(--accent2)":"";
    userLangRow.style.display=l==="ru+it"?"flex":"none";
    if(l==="ru") setUserInputLang("ru-RU");
  }
  btnRu.onclick=()=>setLang("ru"); btnBi.onclick=()=>setLang("ru+it");
  langRow.appendChild(btnRu); langRow.appendChild(btnBi); stage.appendChild(langRow);
  stage.appendChild(userLangRow);
  setLang("ru");
  setUserInputLang("ru-RU");

  // Modalità di pratica
  const modeRow=$(`<div style="display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap"></div>`);
  const modeBtns={
    free:     $(`<button class="btn" style="flex:0;padding:5px 13px;font-size:12px">🗣️ Conversazione</button>`),
    correction:$(`<button class="btn" style="flex:0;padding:5px 13px;font-size:12px">✏️ Correzione</button>`),
    roleplay: $(`<button class="btn" style="flex:0;padding:5px 13px;font-size:12px">🎭 Role-play</button>`)
  };
  function setPracticeMode(m){
    currentPracticeMode=m;
    Object.entries(modeBtns).forEach(([k,b])=>{
      b.style.borderColor=k===m?"var(--accent2)":"";
      b.style.color=k===m?"var(--accent2)":"";
    });
  }
  Object.entries(modeBtns).forEach(([k,b])=>{ b.onclick=()=>setPracticeMode(k); modeRow.appendChild(b); });
  stage.appendChild(modeRow);
  setPracticeMode("free");

  // Status badge
  const statusEl=$(`<div style="text-align:center;font-size:13px;color:var(--muted);min-height:18px;margin-bottom:10px"></div>`);
  stage.appendChild(statusEl);

  // Chat
  const chatEl=$(`<div style="
    width:100%;background:var(--card2);border:1px solid var(--line);border-radius:16px;
    padding:14px 10px;overflow-y:auto;min-height:280px;max-height:420px;
    display:flex;flex-direction:column;gap:14px;margin-bottom:16px
  "></div>`);
  stage.appendChild(chatEl);

  function addBubble(role){
    let bub;
    if(role==="vika"){
      const row=$(`<div class="vika-msg-row"></div>`);
      const char=$(`<img src="vika.png" class="vika-char">`);
      bub=$(`<div class="vika-fumetto"></div>`);
      row.appendChild(char); row.appendChild(bub);
      chatEl.appendChild(row);
      lastVikaWrap=bub;
    } else {
      const wrap=$(`<div style="display:flex;flex-direction:column;align-items:flex-end"></div>`);
      const lbl=$(`<div style="font-size:11px;color:var(--muted);margin-bottom:3px;padding:0 4px;text-align:right">Tu</div>`);
      bub=$(`<div style="
        background:linear-gradient(135deg,var(--accent2),#5b8cff);color:#fff;
        padding:10px 14px;border-radius:14px 4px 14px 14px;
        max-width:88%;font-size:15px;line-height:1.45;box-shadow:var(--shadow-sm)
      "></div>`);
      wrap.appendChild(lbl); wrap.appendChild(bub);
      chatEl.appendChild(wrap);
    }
    chatEl.scrollTop=chatEl.scrollHeight;
    return bub;
  }

  // Pronuncia di una frase a velocità variabile (per i pulsanti 🔁 e 🐢)
  function speakBubble(text, rate){
    const clean=text.replace(/^🗣️[^\n]*\n+/,"").trim();
    if(!clean||!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    if(currentLang==="ru+it"){
      const parts=clean.split(/([.!?…\n]+)/), segs=[];
      for(let i=0;i<parts.length;i+=2){
        const t=(parts[i]+(parts[i+1]||"")).trim(); if(!t) continue;
        const cy=(t.match(/[Ѐ-ӿ]/g)||[]).length, la=(t.match(/[a-zA-Z]/g)||[]).length;
        segs.push({t,isRu:cy>=la});
      }
      let i=0; const next=()=>{
        if(i>=segs.length) return;
        const {t,isRu}=segs[i++];
        const u=new SpeechSynthesisUtterance(t);
        if(isRu){u.lang="ru-RU"; if(ruVoice) u.voice=ruVoice;} else {u.lang="it-IT"; if(itVoice) u.voice=itVoice;}
        u.rate=rate; u.pitch=1.3; u.onend=next; u.onerror=next; speechSynthesis.speak(u);
      };
      next();
    } else {
      const u=new SpeechSynthesisUtterance(clean);
      u.lang="ru-RU"; if(ruVoice) u.voice=ruVoice; u.rate=rate; u.pitch=1.3;
      speechSynthesis.speak(u);
    }
  }

  // Popover su una parola russa: ascolta + salva nelle flashcard SRS
  function openWordPopover(anchor, word){
    document.querySelectorAll(".vika-pop").forEach(p=>p.remove());
    if(!word) return;
    const key=localStorage.getItem(VIKA_KEY);
    const pop=$(`<div class="vika-pop"></div>`);
    pop.appendChild($(`<b>${word}</b>`));
    const row=$(`<div class="pop-row"></div>`);
    const sp=$(`<button>🔊 Ascolta</button>`);
    sp.onclick=()=>speak(word);
    row.appendChild(sp);
    if(key){
      const sv=$(`<button></button>`);
      const refresh=()=>{ const has=isUserVoce(word); sv.textContent=has?"✓ Salvata":"➕ Flashcard"; sv.disabled=has; };
      refresh();
      sv.onclick=async()=>{
        if(isUserVoce(word)) return;
        sv.disabled=true; sv.textContent="⏳";
        let it="";
        try{
          const rr=await fetch(`${VIKA_REST}?key=${key}`,{method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({contents:[{role:"user",parts:[{text:`Traduci in italiano questa parola russa (solo la traduzione, una parola o brevissima espressione, niente note): "${word}"`}]}],generationConfig:{maxOutputTokens:30,temperature:0.1}})});
          const dd=await rr.json();
          it=(dd.candidates?.[0]?.content?.parts?.[0]?.text||"").trim().replace(/^["']|["']$/g,"");
        }catch(e){}
        if(!it) it="(da tradurre)";
        addUserVoce(word, it, "", "vika");
        if(DB && DB.voci) DB.voci.push({id:"u"+Date.now(), ru:word, it, tag:["vika"]});
        anchor.classList.add("saved");
        sv.textContent="✓ Salvata"; haptic(true);
      };
      row.appendChild(sv);
    }
    pop.appendChild(row);
    document.body.appendChild(pop);
    const r=anchor.getBoundingClientRect(), pw=pop.offsetWidth, ph=pop.offsetHeight;
    let left=Math.max(8,Math.min(r.left+window.scrollX+r.width/2-pw/2, window.innerWidth-pw-8));
    let top=(r.bottom+ph+12>window.innerHeight) ? r.top+window.scrollY-ph-6 : r.bottom+window.scrollY+6;
    pop.style.left=left+"px"; pop.style.top=top+"px";
    setTimeout(()=>{
      const close=ev=>{ if(!pop.contains(ev.target)){ pop.remove(); document.removeEventListener("pointerdown",close); } };
      document.addEventListener("pointerdown",close);
    },0);
  }

  // Scrive il testo nel fumetto rendendo tappabile ogni parola russa
  function appendClickableRu(el, text){
    for(const tok of text.split(/(\s+)/)){
      if(/[Ѐ-ӿ]/.test(tok)){
        const clean=tok.replace(/[^Ѐ-ӿ-]/g,"");
        const span=$(`<span class="vika-word"></span>`);
        span.textContent=tok;
        if(clean && isUserVoce(clean)) span.classList.add("saved");
        span.onclick=ev=>{ ev.stopPropagation(); openWordPopover(span, clean); };
        el.appendChild(span);
      } else if(tok){
        el.appendChild(document.createTextNode(tok));
      }
    }
  }

  function renderVikaBubble(bub, text){
    bub.textContent="";
    let body=text;
    const m=text.match(/^🗣️\s*([^\n]*)\n+([\s\S]*)$/);
    if(m){
      bub.appendChild($(`<div style="font-size:13px;color:var(--accent);background:rgba(226,56,75,.08);border-radius:8px;padding:5px 9px;margin-bottom:7px;line-height:1.4">🗣️ ${m[1]}</div>`));
      body=m[2];
    }
    appendClickableRu(bub, body);
  }

  function addBubbleTools(bub, text){
    const key=localStorage.getItem(VIKA_KEY);
    const tools=$(`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:2px;margin-top:6px;border-top:1px solid var(--line);padding-top:5px"></div>`);
    const rep=$(`<button class="vika-tool">🔁 ripeti</button>`);
    rep.onclick=()=>speakBubble(text,0.88);
    const slow=$(`<button class="vika-tool">🐢 più lento</button>`);
    slow.onclick=()=>speakBubble(text,0.55);
    tools.appendChild(rep); tools.appendChild(slow);
    bub.appendChild(tools);
    if(!key) return;
    const itDiv=$(`<div style="font-size:13px;color:var(--muted);margin-top:4px;padding:0 4px;display:none;line-height:1.4"></div>`);
    const btn=$(`<button class="vika-tool">🇮🇹 traduci</button>`);
    const src=text.replace(/^🗣️[^\n]*\n+/,"").trim();
    let cached=null;
    btn.onclick=async()=>{
      if(cached!==null){
        itDiv.style.display=itDiv.style.display==="none"?"block":"none";
        btn.textContent=itDiv.style.display==="none"?"🇮🇹 traduci":"🇮🇹 nascondi";
        return;
      }
      btn.textContent="⏳"; btn.disabled=true;
      try{
        const r=await fetch(`${VIKA_REST}?key=${key}`,{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            contents:[{role:"user",parts:[{text:`Traduci solo in italiano (solo la traduzione, senza note o spiegazioni): "${src}"`}]}],
            generationConfig:{maxOutputTokens:80,temperature:0.2}
          })});
        const d=await r.json();
        cached=(d.candidates?.[0]?.content?.parts?.[0]?.text||"").trim();
      }catch(e){cached="";}
      if(cached){itDiv.textContent=cached; itDiv.style.display="block"; btn.textContent="🇮🇹 nascondi";}
      else{btn.textContent="🇮🇹 errore"; setTimeout(()=>{btn.textContent="🇮🇹 traduci"; btn.disabled=false;},2000); return;}
      btn.disabled=false;
    };
    tools.appendChild(btn); bub.appendChild(itDiv);
  }

  function onMsg({role,text,final}){
    if(role==="vika"){
      if(!vikaEl) vikaEl=addBubble("vika");
      vikaEl.textContent=text;
      if(final){
        const bub=vikaEl, t=text;
        vikaEl=null;
        renderVikaBubble(bub, t);
        addBubbleTools(bub, t);
      }
    } else {
      if(!userEl) userEl=addBubble("user");
      userEl.textContent=text;
      if(final) userEl=null;
    }
    chatEl.scrollTop=chatEl.scrollHeight;
  }

  const STATUS={
    connecting:"⏳ Connessione in corso...",
    connected:"✅ Connessa — inizia a parlare",
    listening:"🎤 In ascolto...",
    recording:"🎙️ Ti sento — parla pure",
    thinking:"🤔 Vika sta pensando...",
    speaking:"💬 Vika sta parlando...",
    error:"❌ Connessione fallita — controlla la API key",
    dropped:"⚠️ Connessione interrotta",
    disconnected:""
  };

  function onStatus(s){
    statusEl.textContent=STATUS[s]||"";
    const active=s==="connected"||s==="listening"||s==="speaking"||s==="recording"||s==="thinking";
    const busy=s==="connecting";
    micBtn.textContent=active?"⏹️":busy?"⏳":"🎙️";
    micBtn.style.background=active
      ?"linear-gradient(135deg,var(--accent2),#5b8cff)"
      :busy?"var(--card2)"
      :"linear-gradient(135deg,var(--accent),#f0526a)";
    micBtn.style.color=busy?"var(--muted)":"#fff";
    micBtn.classList.toggle("mic-listening", s==="listening"||s==="recording");
    micLabel.textContent=active?"Premi per terminare":busy?"Connessione...":"Premi per parlare con Vika";
    if(s==="error"){
      const eb=addBubble("vika");
      eb.textContent="❌ Connessione a Gemini fallita. Verifica che la API key sia corretta e riprova.";
      session=null; vikaEl=null; userEl=null;
    }
    if(s==="dropped"){
      const eb=addBubble("vika");
      eb.textContent="⚠️ La connessione si è interrotta. Premi di nuovo il microfono per riprendere: Vika ricorda la conversazione.";
      session?.disconnect(); // chiude mic/audio e salva la memoria via stato disconnected
    }
    if(s==="disconnected"){
      if(session) vikaSaveMem(session.history);
      session=null; vikaEl=null; userEl=null;
    }
  }

  // Pulsante microfono
  const micWrap=$(`<div style="text-align:center;margin-bottom:10px"></div>`);
  const micBtn=$(`<button style="
    width:76px;height:76px;border-radius:50%;border:none;font-size:30px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),#f0526a);
    box-shadow:0 6px 20px rgba(226,56,75,.35);transition:.15s;color:#fff
  ">🎙️</button>`);
  const micLabel=$(`<div style="margin-top:8px;font-size:12px;color:var(--muted)">Premi per parlare con Vika</div>`);
  micWrap.appendChild(micBtn); micWrap.appendChild(micLabel); stage.appendChild(micWrap);

  // Input da tastiera: alternativa al microfono (utile in pubblico).
  // Avvia una sessione "solo testo" se non ce n'è una attiva, altrimenti
  // inserisce il messaggio nella conversazione in corso.
  const typeRow=$(`<div style="display:flex;gap:8px;max-width:430px;margin:0 auto 10px"></div>`);
  const typeInp=$(`<input type="text" placeholder="…oppure scrivi qui" style="flex:1;min-width:0;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--text);font-size:15px;box-sizing:border-box">`);
  const sendBtn=$(`<button class="btn" style="flex:0 0 auto;padding:0 18px">Invia</button>`);
  function sendTyped(){
    const t=typeInp.value.trim(); if(!t) return;
    const key=localStorage.getItem(VIKA_KEY);
    if(!key){ showKeyModal(); return; }
    typeInp.value="";
    if(session){ session.sendText(t); return; }
    session=new VikaSession({
      apiKey:key, lang:currentLang, db:DB, onMsg, onStatus,
      practiceMode:currentPracticeMode,
      srsStats:vikaSrsStats(),
      lastSession:vikaLoadMem()
    });
    session.userInputLang=currentUserLang;
    session.textOnly=true;
    session.connect().then(()=>session.sendText(t)).catch(()=>onStatus("error"));
  }
  sendBtn.onclick=sendTyped;
  typeInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); sendTyped(); } });
  typeRow.appendChild(typeInp); typeRow.appendChild(sendBtn); stage.appendChild(typeRow);

  micBtn.onclick=async()=>{
    if(session){ session.disconnect(); return; }
    const key=localStorage.getItem(VIKA_KEY);
    if(!key){ showKeyModal(); return; }
    session=new VikaSession({
      apiKey:key, lang:currentLang, db:DB, onMsg, onStatus,
      practiceMode:currentPracticeMode,
      srsStats:vikaSrsStats(),
      lastSession:vikaLoadMem()
    });
    session.userInputLang=currentUserLang;
    session.connect().catch(()=>onStatus("error"));
  };

  // Link impostazione chiave
  const hasKey=!!localStorage.getItem(VIKA_KEY);
  const keyEl=$(`<p style="text-align:center;margin:4px 0 0"><a href="#" style="font-size:12px;color:var(--accent2)">${hasKey?"✓ API key configurata · cambia":"🔑 Configura API key Gemini"}</a></p>`);
  keyEl.querySelector("a").onclick=e=>{e.preventDefault();showKeyModal();};
  stage.appendChild(keyEl);

  function showKeyModal(){
    const ov=$(`<div style="position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px">
      <div style="background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)">
        <h3 style="margin:0 0 8px;font-size:18px">🔑 API Key Gemini</h3>
        <p style="font-size:13px;color:var(--muted);margin:0 0 14px;line-height:1.55">
          Ottieni la chiave gratuita su <b>aistudio.google.com</b> → <b>Get API key</b>.<br>
          Salvata solo su questo dispositivo.
        </p>
        <input id="kIn" type="password" placeholder="Incolla la tua API key..." style="width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--text);font-size:15px;box-sizing:border-box;margin-bottom:14px">
        <div style="display:flex;gap:10px">
          <button class="btn" id="kCx" style="flex:1">Annulla</button>
          <button class="btn primary" id="kSv" style="flex:1">Salva</button>
        </div>
      </div>
    </div>`);
    document.body.appendChild(ov);
    const inp=ov.querySelector("#kIn");
    inp.value=localStorage.getItem(VIKA_KEY)||"";
    ov.querySelector("#kCx").onclick=()=>ov.remove();
    ov.querySelector("#kSv").onclick=()=>{
      const v=inp.value.trim();
      if(v){ localStorage.setItem(VIKA_KEY,v); keyEl.querySelector("a").textContent="✓ API key configurata · cambia"; }
      ov.remove();
    };
    setTimeout(()=>inp.focus(),50);
  }
}

// ---------- theme-color dinamico (chiaro/scuro segue il sistema) ----------
const darkMq = window.matchMedia ? matchMedia('(prefers-color-scheme: dark)') : null;
function syncThemeColor(){
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', darkMq && darkMq.matches ? '#0d1220' : '#ffffff');
}
syncThemeColor();
if(darkMq && darkMq.addEventListener) darkMq.addEventListener('change', syncThemeColor);

// ---------- skeleton mentre carica ----------
function renderSkeleton(){
  app.innerHTML="";
  const sk=document.createElement("div");
  sk.innerHTML =
    `<div class="stats">${'<div class="stat sk"></div>'.repeat(4)}</div>`+
    `<div class="grid">${'<div class="tile sk"></div>'.repeat(4)}</div>`;
  app.appendChild(sk);
}

// ---------- boot ----------
renderSkeleton();
fetch("knowledge.json?_="+Date.now())
  .then(r=>r.json())
  .then(db=>{
    const u = userStore();
    db.voci = [...(db.voci||[]), ...(u.voci||[])];
    DB=db; renderHome();
  })
  .catch(e=>{ app.innerHTML=`<div class="errbox"><div class="big">⚠️</div><p>Impossibile caricare i contenuti.</p><button class="btn" onclick="location.reload()" style="max-width:200px">Riprova</button><small>${e}</small></div>`; });

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).catch(()=>{});
}

// splash: rimane 2 s poi sfuma in 400 ms
setTimeout(()=>{
  const s=document.getElementById('splash');
  s.classList.add('fade-out');
  s.addEventListener('transitionend',()=>s.remove(),{once:true});
},2000);
</script>
</body>
</html>
