    <path d="M 70,524 C 62,360 82,198 176,126 C 212,98 300,98 336,126
             C 430,198 450,360 442,524 Z" fill="url(#scarfSh)"/>

    <!-- pois bianchi -->
    <g fill="#fdf2ec">
      <circle cx="256" cy="128" r="10"/>
      <circle cx="198" cy="150" r="8"/>
      <circle cx="314" cy="150" r="8"/>
      <circle cx="150" cy="216" r="9"/>
      <circle cx="362" cy="216" r="9"/>
      <circle cx="138" cy="330" r="9"/>
      <circle cx="374" cy="330" r="9"/>
      <circle cx="150" cy="420" r="11"/>
      <circle cx="256" cy="446" r="12"/>
      <circle cx="362" cy="420" r="11"/>
      <circle cx="112" cy="492" r="10"/>
      <circle cx="400" cy="492" r="10"/>
      <circle cx="210" cy="486" r="9"/>
