      <ellipse cx="220" cy="262" rx="22" ry="20" fill="#ffffff"/>
      <ellipse cx="292" cy="262" rx="22" ry="20" fill="#ffffff"/>
      <!-- iride -->
      <circle cx="222" cy="264" r="14" fill="#4a86c5"/>
      <circle cx="290" cy="264" r="14" fill="#4a86c5"/>
      <circle cx="222" cy="264" r="7" fill="#21323f"/>
      <circle cx="290" cy="264" r="7" fill="#21323f"/>
      <!-- luci -->
      <circle cx="217" cy="258" r="4.5" fill="#ffffff"/>
      <circle cx="285" cy="258" r="4.5" fill="#ffffff"/>
      <circle cx="227" cy="269" r="2.2" fill="#ffffff" opacity="0.8"/>
      <circle cx="295" cy="269" r="2.2" fill="#ffffff" opacity="0.8"/>
      <!-- ciglia superiori -->
      <path d="M 200,254 Q 220,243 242,253" stroke="#5a3b2a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M 270,253 Q 292,243 312,254" stroke="#5a3b2a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M 240,252 l 6,-5 M 272,252 l -6,-5" stroke="#5a3b2a" stroke-width="3" stroke-linecap="round"/>
    </g>

