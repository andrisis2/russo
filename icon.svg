<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- sfondo azzurro (richiama la tavoletta Alёnka) -->
  <rect width="512" height="512" rx="96" fill="#a9dcec"/>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#cdeefb"/>
      <stop offset="100%" stop-color="#9ad2e6"/>
    </radialGradient>
    <clipPath id="round"><rect width="512" height="512" rx="96"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- fazzoletto (scarf) marrone-rosso che incornicia il viso e ricade fino in basso -->
    <path d="M 92,520 C 92,300 108,176 198,118 C 230,96 282,96 314,118
             C 404,176 420,300 420,520 Z" fill="#b9543b"/>
    <path d="M 92,520 C 92,300 108,176 198,118 C 230,96 282,96 314,118
             C 404,176 420,300 420,520 Z" fill="url(#scarf)" opacity="0.25"/>
    <defs>
      <linearGradient id="scarf" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#7d2f1d"/>
      </linearGradient>
    </defs>

    <!-- pois bianchi sul fazzoletto -->
    <g fill="#fdf3ec" opacity="0.9">
      <circle cx="256" cy="120" r="11"/>
      <circle cx="200" cy="146" r="9"/>
      <circle cx="312" cy="146" r="9"/>
      <circle cx="158" cy="210" r="10"/>
      <circle cx="354" cy="210" r="10"/>
      <circle cx="150" cy="402" r="12"/>
      <circle cx="256" cy="430" r="13"/>
      <circle cx="362" cy="402" r="12"/>
      <circle cx="116" cy="470" r="11"/>
      <circle cx="396" cy="470" r="11"/>
      <circle cx="206" cy="466" r="10"/>
      <circle cx="306" cy="466" r="10"/>
    </g>

    <!-- nodo del fazzoletto sotto il mento -->
    <g fill="#a8482f">
      <ellipse cx="226" cy="372" rx="30" ry="20" transform="rotate(-18 226 372)"/>
      <ellipse cx="288" cy="372" rx="30" ry="20" transform="rotate(18 288 372)"/>
      <circle cx="256" cy="368" r="18"/>
    </g>

    <!-- bordo crema del fazzoletto attorno al viso -->
    <ellipse cx="256" cy="250" rx="108" ry="116" fill="#fdf3ec"/>

    <!-- viso -->
    <ellipse cx="256" cy="252" rx="92" ry="100" fill="#f7d2b6"/>

    <!-- frangia bionda sotto il bordo del fazzoletto -->
    <path d="M 182,182 Q 256,150 330,182 Q 332,200 312,198 Q 300,214 286,196
             Q 272,214 256,196 Q 240,214 226,196 Q 212,214 200,198 Q 180,200 182,182 Z"
          fill="#f0c46a"/>

    <!-- guance rosee -->
    <circle cx="198" cy="282" r="20" fill="#f3a3a0" opacity="0.65"/>
    <circle cx="314" cy="282" r="20" fill="#f3a3a0" opacity="0.65"/>

    <!-- sopracciglia -->
    <path d="M 204,222 Q 222,215 240,221" stroke="#c79356" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M 272,221 Q 290,215 308,222" stroke="#c79356" stroke-width="4.5" fill="none" stroke-linecap="round"/>

    <!-- occhi -->
    <g>
      <ellipse cx="222" cy="246" rx="18" ry="15" fill="#ffffff"/>
      <ellipse cx="290" cy="246" rx="18" ry="15" fill="#ffffff"/>
      <circle cx="224" cy="248" r="9" fill="#3a78b5"/>
      <circle cx="288" cy="248" r="9" fill="#3a78b5"/>
      <circle cx="224" cy="248" r="4.5" fill="#1c2a36"/>
      <circle cx="288" cy="248" r="4.5" fill="#1c2a36"/>
      <circle cx="221" cy="244" r="2.5" fill="#ffffff"/>
      <circle cx="285" cy="244" r="2.5" fill="#ffffff"/>
    </g>

    <!-- naso -->
    <path d="M 256,258 Q 250,278 256,284 Q 262,284 264,280" stroke="#d9a07e" stroke-width="4"
          fill="none" stroke-linecap="round"/>

    <!-- bocca sorridente -->
    <path d="M 232,302 Q 256,322 280,302 Q 256,312 232,302 Z" fill="#d8584f"/>
  </g>
</svg>
