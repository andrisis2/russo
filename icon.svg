<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sky" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#e3f4fd"/>
      <stop offset="55%" stop-color="#bfe6f6"/>
      <stop offset="100%" stop-color="#9fd4ea"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a7ad"/>
      <stop offset="100%" stop-color="#f5a7ad" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scarfSh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7e2f33" stop-opacity="0.30"/>
    </linearGradient>
    <radialGradient id="faceSh" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#fbdcc4"/>
      <stop offset="100%" stop-color="#f1c3a2"/>
    </radialGradient>
    <clipPath id="round"><rect width="512" height="512" rx="104"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- sfondo azzurro -->
    <rect width="512" height="512" fill="url(#sky)"/>
    <ellipse cx="256" cy="250" rx="190" ry="200" fill="#ffffff" opacity="0.18"/>

    <!-- fazzoletto (platok) -->
    <path d="M 70,524 C 62,360 82,198 176,126 C 212,98 300,98 336,126
