    <path d="M 234,308 Q 256,330 278,308 Q 256,318 234,308 Z" fill="#d76a6c"/>
    <path d="M 240,310 Q 256,320 272,310 Q 256,314 240,310 Z" fill="#f4a3a0" opacity="0.7"/>
